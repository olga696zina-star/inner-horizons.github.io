<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — Inner Horizons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #151e2d, #0a0e14);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 40px 35px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            color: #f0e9e0;
            text-align: center;
        }
        .logo-link {
            font-size: 22px;
            color: #f5d7b3;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .logo-link a { color: #f5d7b3; text-decoration: none; }
        .logo-link span { color: #8f847a; font-weight: 300; }
        h1 {
            font-size: 32px;
            font-weight: 400;
            color: #f5d7b3;
            margin-bottom: 8px;
        }
        .sub {
            font-size: 16px;
            color: #a89f94;
            margin-bottom: 30px;
        }
        .field {
            margin-bottom: 20px;
            text-align: left;
        }
        .field label {
            display: block;
            font-size: 16px;
            margin-bottom: 6px;
            color: #ddd6cc;
        }
        .field input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #f0e9e0;
            font-size: 16px;
            font-family: 'Georgia', serif;
            outline: none;
            transition: 0.3s;
        }
        .field input:focus {
            border-color: #f5d7b3;
            background: rgba(255, 255, 255, 0.07);
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: #f5d7b3;
            color: #0b0f1a;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Georgia', serif;
        }
        .btn:hover {
            background: #ffebd0;
            transform: scale(1.01);
        }
        .info {
            margin-top: 16px;
            font-size: 14px;
            color: #6a6258;
        }
        .info a {
            color: #f5d7b3;
            text-decoration: none;
        }
        .notification {
            display: none;
            margin-top: 20px;
            padding: 16px;
            background: rgba(125, 223, 154, 0.1);
            border: 1px solid rgba(125, 223, 154, 0.2);
            border-radius: 16px;
            color: #7ddf9a;
            font-size: 16px;
            line-height: 1.6;
        }
        .notification strong {
            color: #f5d7b3;
        }
        .notification .emoji {
            font-size: 24px;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-link">
        <a href="index.html">✧ Inner<span>Horizons</span></a>
    </div>

    <h1>✧ Начать путь</h1>
    <div class="sub">Создай аккаунт, чтобы войти в пространство</div>

    <!-- ФОРМА РЕГИСТРАЦИИ -->
    <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="field">
            <label>🌿 Как тебя зовут?</label>
            <input type="text" id="userName" placeholder="Твоё имя" required />
        </div>
        <div class="field">
            <label>📧 Email</label>
            <input type="email" id="userEmail" placeholder="Твоя почта" required />
        </div>
        <div class="field">
            <label>🔒 Пароль</label>
            <input type="password" id="userPassword" placeholder="Придумай пароль" required />
        </div>
        <button class="btn" type="submit">✧ Создать аккаунт</button>
    </form>

    <div class="info">
        Уже есть аккаунт? <a href="#">Войти</a>
    </div>

    <!-- БЛОК С БЛАГОДАРНОСТЬЮ (появляется после регистрации) -->
    <div id="thankYouBlock" class="notification">
        <span class="emoji">✧</span>
        <strong>Добро пожаловать в Inner Horizons!</strong><br />
        На вашу почту <span id="userEmailDisplay"></span> отправлено письмо с подтверждением.<br />
        <span style="color: #a89f94; font-size: 14px;">Вы перенаправлены в личный кабинет через 3 секунды...</span>
    </div>
</div>

<script>
    // ============================================================
    // === ОБРАБОТКА РЕГИСТРАЦИИ ===
    // ============================================================

    function handleRegister(event) {
        event.preventDefault(); // отменяем стандартную отправку формы

        // Получаем данные из полей
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const password = document.getElementById('userPassword').value.trim();

        // Простая проверка: все поля должны быть заполнены
        if (!name || !email || !password) {
            alert('❌ Пожалуйста, заполните все поля.');
            return;
        }

        // === ПОКАЗЫВАЕМ БЛАГОДАРСТВЕННОЕ СООБЩЕНИЕ ===
        const thankYouBlock = document.getElementById('thankYouBlock');
        const emailDisplay = document.getElementById('userEmailDisplay');
        emailDisplay.textContent = email; // вставляем email пользователя
        thankYouBlock.style.display = 'block'; // показываем блок

        // Скрываем форму регистрации
        document.getElementById('registerForm').style.display = 'none';

        // Имитация отправки письма на почту (демо-режим)
        console.log(`✅ Приветственное письмо отправлено на ${email}`);

        // === ПЕРЕНАПРАВЛЕНИЕ В ЛИЧНЫЙ КАБИНЕТ ЧЕРЕЗ 3 СЕКУНДЫ ===
        setTimeout(function() {
            window.location.href = 'cabinet.html';
        }, 3000);
    }
</script>

</body>
</html>

</body>
</html>
