<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Inner Horizons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #151e2d, #0a0e14);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 40px 35px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            color: #f0e9e0;
        }
        h1 { font-size: 32px; font-weight: 400; text-align: center; color: #f5d7b3; margin-bottom: 8px; }
        .sub { text-align: center; font-size: 16px; color: #a89f94; margin-bottom: 30px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 16px; margin-bottom: 6px; color: #ddd6cc; }
        .field input {
            width: 100%; padding: 14px 18px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #f0e9e0; font-size: 16px; font-family: 'Georgia', serif;
            outline: none; transition: 0.3s;
        }
        .field input:focus { border-color: #f5d7b3; background: rgba(255,255,255,0.07); }
        .btn {
            width: 100%; padding: 16px;
            background: #f5d7b3; color: #0b0f1a;
            border: none; border-radius: 60px;
            font-size: 20px; font-weight: 700;
            cursor: pointer; transition: 0.3s; font-family: 'Georgia', serif;
        }
        .btn:hover { background: #ffebd0; transform: scale(1.01); }
        .info { text-align: center; margin-top: 16px; font-size: 14px; color: #6a6258; }
        .info a { color: #f5d7b3; text-decoration: none; }
        .logo-link {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
            color: #f5d7b3;
            letter-spacing: 2px;
        }
        .logo-link a { color: #f5d7b3; text-decoration: none; }
        .logo-link span { color: #8f847a; font-weight: 300; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-link"><a href="index.html">✧ Inner<span>Horizons</span></a></div>
    <h1>✧ Начать путь</h1>
    <div class="sub">Создай аккаунт, чтобы войти в пространство</div>
    <form onsubmit="event.preventDefault(); alert('✅ Добро пожаловать! Вы перенаправлены в кабинет.'); window.location.href='cabinet.html';">
        <div class="field">
            <label>🌿 Как тебя зовут?</label>
            <input type="text" placeholder="Твоё имя" required />
        </div>
        <div class="field">
            <label>📧 Email</label>
            <input type="email" placeholder="Твоя почта" required />
        </div>
        <div class="field">
            <label>🔒 Пароль</label>
            <input type="password" placeholder="Придумай пароль" required />
        </div>
        <button class="btn" type="submit">✧ Создать аккаунт</button>
    </form>
    <div class="info">Уже есть аккаунт? <a href="#">Войти</a></div>
</div>
</body>
</html>
